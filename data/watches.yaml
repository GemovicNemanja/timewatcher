    price: { retail: 4050, preOwnedLow: 2900, preOwnedHigh: 3600 }
    specs:
      caseDiameterMm: 39
      thicknessMm: 11.9
      lugToLugMm: 47.8
      lugWidthMm: 20
      movementType: automatic
      caliber: Tudor MT5402
      powerReserveH: 70
      waterResistanceM: 200
      crystal: sapphire
      yearReleased: 2018
    art: { case: round, dial: "#17191d", accent: "#c6a46d", strap: bracelet, bezel: true, numerals: baton }
    styleDescription: >-
      A compact, vintage-minded dive watch with a matte black dial, warm gilt printing and hands, a dark timing bezel, and a brushed steel bracelet. It borrows the charm of a late-1950s tool watch without looking like a costume or a fragile antique. The mood is confident but quiet: recognisably sporty to an enthusiast, restrained enough to disappear under a navy jacket. Its 39mm case and relatively slim profile wear neatly on small and average wrists, while the broad bezel gives it more visual presence than a dress watch. It works especially well with denim, knitwear, military jackets, linen, and relaxed tailoring. It can handle a casual wedding or an everyday office, though the dive bezel makes it less correct with black tie. Avoid it when the brief calls for something delicate, colourful, or genuinely formal. This is the safe answer for someone who wants one handsome mechanical watch with heritage character, real water capability, and almost no flash.

  - id: rolex-submariner-date-126610ln
    brand: Rolex
    model: Submariner Date
    reference: 126610LN
    price: { retail: 10900, preOwnedLow: 12800, preOwnedHigh: 14750 }
    specs:
      caseDiameterMm: 41
      thicknessMm: 12.3
      lugToLugMm: 47.6
      lugWidthMm: 21
      movementType: automatic
      caliber: Rolex 3235
      powerReserveH: 70
      waterResistanceM: 300
      crystal: sapphire
      yearReleased: 2020
    art: { case: round, dial: "#111418", accent: "#f4f5f6", strap: bracelet, bezel: true, numerals: dot }
    styleDescription: >-
      The modern black Submariner is a polished version of the archetypal dive watch: glossy black dial, crisp white luminous markers, black ceramic bezel, cyclops date window, and a solid steel Oyster bracelet. It projects competence, expense, and instant recognition rather than obscurity. The design is exceptionally balanced, but its cultural visibility means it never feels anonymous; people who know watches will notice it. Although nominally 41mm, the short lug span makes it sit securely on many average wrists, with enough weight and shine to remain present. It is ideal with weekend clothes, business casual, travel, and nearly any active setting, and it is tough enough to be a true daily watch. It can work with a suit in modern offices, but it is not an understated wedding choice and is too sporty for strict evening dress. Choose it when you want the definitive luxury tool watch and do not mind the status signal. Skip it when discretion, affordability, or a vintage cream-dial mood matters more than iconography.

  - id: omega-seamaster-diver-300m-21030422001001
