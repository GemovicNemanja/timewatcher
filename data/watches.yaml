      lugToLugMm: 47.7
      lugWidthMm: 19
      movementType: hand-wound
      caliber: Nomos Alpha
      powerReserveH: 43
      waterResistanceM: 30
      crystal: sapphire
      yearReleased: 2005
    art: { case: round, dial: "#f4f1e8", accent: "#31599a", strap: leather, bezel: false, numerals: arabic }
    styleDescription: >-
      A remarkably thin German dress watch with a warm silver-white dial, crisp black typography, tiny blue hands, a small-seconds subdial, wire-like lugs, and a plain black leather strap. Its Bauhaus vocabulary is clean without becoming sterile; the hand-wound movement and visible proportions keep it human. It projects intelligence, restraint, and quiet design awareness rather than conventional luxury. The 37.5mm diameter is modest, but the unusually long straight lugs make it wear larger across the wrist, so lug-to-lug deserves attention on a very small wrist. At under seven millimetres thick it vanishes under a shirt cuff. It is superb for weddings, creative offices, dinners, galleries, and minimal tailoring, and it also lifts a simple knit and jeans. Low water resistance and the delicate strap make it a poor companion for sport, swimming, or careless travel. Choose it when understated, thin, cream-dial, or design-led appears in the query. Avoid it when ruggedness, automatic convenience, or heavy visual presence is required.

  - id: longines-spirit-37-l34104636
    brand: Longines
    model: Spirit 37
    reference: L3.410.4.63.6
    price: { retail: 2650, preOwnedLow: 1550, preOwnedHigh: 2050 }
    specs:
      caseDiameterMm: 37
      thicknessMm: 11.7
      lugToLugMm: 45
      lugWidthMm: 19
      movementType: automatic
      caliber: Longines L888.4
      powerReserveH: 72
      waterResistanceM: 100
      crystal: sapphire
      yearReleased: 2022
    art: { case: round, dial: "#ead9b7", accent: "#29323d", strap: bracelet, bezel: false, numerals: arabic }
    styleDescription: >-
      A compact aviation-inspired watch with a warm champagne dial, applied Arabic numerals, diamond-shaped hands, a small date, polished bezel, and sturdy steel bracelet. Its styling references early pilots' instruments but the finishing is much more refined than true military equipment. The result feels versatile, mature, and quietly luxurious rather than rugged for ruggedness' sake. At 37mm with controlled thickness and a short lug span, it is especially friendly to smaller wrists and sits cleanly beneath most cuffs. The pale dial and polished details pair easily with navy or grey tailoring, oxford shirts, suede, knitwear, and smart casual clothes; on leather it can handle a relaxed wedding with ease. Strong everyday water resistance means it need not be treated like a fragile dress watch. It is an excellent compound answer for someone wanting vintage warmth, a small fit, and practical daily durability. It is less apt for a request centred on a true dive bezel, extreme toughness, or stark modern minimalism, and its five-star dial details are busier than the simplest field watches.

  - id: grand-seiko-snowflake-sbga211
    brand: Grand Seiko
    model: Snowflake
    reference: SBGA211
    price: { retail: 6200, preOwnedLow: 3900, preOwnedHigh: 4900 }
    specs:
      caseDiameterMm: 41
      thicknessMm: 12.5
      lugToLugMm: 49
      lugWidthMm: 20
      movementType: spring-drive
      caliber: Grand Seiko 9R65
      powerReserveH: 72
      waterResistanceM: 100
      crystal: sapphire
      yearReleased: 2017
    art: { case: round, dial: "#f2f4f5", accent: "#3d68a3", strap: bracelet, bezel: false, numerals: baton }
    styleDescription: >-
      The Snowflake combines a finely textured white dial, razor-polished steel-like titanium facets, slim baton markers, a heat-blue seconds hand, power-reserve indicator, and a lightweight bracelet. The dial resembles wind-swept snow rather than a flat white surface, giving it quiet detail that rewards close viewing. Its smoothly gliding Spring Drive seconds hand adds a distinctly serene, technical character. The mood is thoughtful, precise, and refined, with far less overt status signalling than many watches at the same price. At 41mm and nearly 49mm lug-to-lug it has real presence, but titanium keeps the physical weight surprisingly low; small wrists should still try it first. It works with business clothing, a wedding suit, smart casual layers, and contemplative everyday wear, while 100m resistance makes it more practical than a pure dress watch. Choose it for subtle craftsmanship, a bright textured dial, or an unusual high-accuracy mechanical experience. Avoid it when compact dimensions, a simple two-hand layout, or a genuinely inexpensive tool watch is the priority.

  - id: tissot-prx-powermatic-80-t1374071105100
