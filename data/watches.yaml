      thicknessMm: 6.6
      lugToLugMm: 33.7
      lugWidthMm: 19
      movementType: quartz
      caliber: Cartier 157
      powerReserveH: null
      waterResistanceM: 30
      crystal: sapphire
      yearReleased: 2021
    art: { case: rectangle, dial: "#f5f0df", accent: "#244479", strap: leather, bezel: false, numerals: roman }
    styleDescription: >-
      The Tank is a slim rectangular dress watch defined by ivory dial space, black Roman numerals, blued sword hands, a beaded crown, and a black leather strap. Its shape is architectural and immediately elegant without relying on precious metal or mechanical theatre. The quartz movement keeps it thin, accurate, and easy to live with; there is no apology required for that practicality. It projects taste, culture, and restraint rather than technical toughness. The narrow 25.5mm width is intentionally small by sports-watch standards, yet the long brancards give it enough graphic presence on almost any wrist. It is exceptional with a suit, a dinner jacket, a crisp shirt, knitwear, or minimalist womenswear, and it is probably the strongest wedding choice in the catalog. It does not belong in the pool, on a rough hike, or with a request for a chunky survival object. Choose it for understated formality and timeless design. Avoid it if water resistance, luminous visibility, or an obviously mechanical experience is central to the brief.

