    specs:
      caseDiameterMm: 42
      thicknessMm: 13.6
      lugToLugMm: 49.9
      lugWidthMm: 20
      movementType: automatic
      caliber: Omega 8800
      powerReserveH: 55
      waterResistanceM: 300
      crystal: sapphire
      yearReleased: 2018
    art: { case: round, dial: "#eceff1", accent: "#26364f", strap: bracelet, bezel: true, numerals: dot }
    styleDescription: >-
      A bright, technical dive watch with a white ceramic wave dial, skeletonised hands, dark bezel, scalloped edge, and an articulated steel bracelet. It feels more graphic and contemporary than a vintage diver; the high-contrast dial and unusual handset make it unmistakable from across a room. The mood is capable, energetic, and faintly futuristic, with just enough polished metal to read as luxury. At 42mm with a broad lug span and substantial thickness, it wears best on medium or larger wrists and will announce itself rather than slip away. It suits sportswear, travel, summer clothes, a wetsuit, and relaxed business wardrobes. The white dial can look sharp with tailoring, but the helium valve and chunky bracelet keep it firmly out of traditional dress-watch territory. It is an excellent choice for someone asking for rugged water resistance with more personality than a black tool watch. It is the wrong answer for a tiny wrist, a discreet formal occasion, or anyone who wants the soft warmth of a vintage field watch.

  - id: hamilton-khaki-field-mechanical-h69439931
    brand: Hamilton
