      yearReleased: 2020
    art: { case: round, dial: "#214b3b", accent: "#d7b56e", strap: leather, bezel: false, numerals: arabic }
    styleDescription: >-
      A characterful Japanese adventure watch with a deep sunburst green dial, gold-tone cathedral hands and markers, an internal compass ring, polished steel case, and brown leather strap. It mixes mountaineering roots with a slightly ornate, almost storybook quality. The green and gold palette feels warm, vintage, and conspicuous in a charming way; this is not the watch for someone asking for pure minimalism. Its compact lug-to-lug makes the 39.5mm case manageable on many wrists, although the case is thicker and more rounded than the diameter first suggests. It looks excellent with earth tones, tweed, denim, boots, corduroy, and outdoor clothing, and can bring personality to business casual. Despite serious water resistance, the supplied leather strap should be changed before swimming. It works for an adventurous everyday watch under $1,000 and for someone who wants colour without a modern fashion-watch look. It is less convincing with strict formalwear, a monochrome minimalist wardrobe, or a brief that says nothing flashy.

  - id: casio-g-shock-dw5600ue-1
    brand: Casio
    model: G-Shock DW-5600
    reference: DW5600UE-1
    price: { retail: 99, preOwnedLow: 45, preOwnedHigh: 75 }
    specs:
      caseDiameterMm: 42.8
      caseWidthMm: 42.8
      thicknessMm: 13.4
      lugToLugMm: 48.9
      lugWidthMm: 16
      movementType: quartz
      caliber: Casio 3525
      powerReserveH: null
      waterResistanceM: 200
      crystal: mineral
      yearReleased: 2023
    art: { case: square, dial: "#879486", accent: "#20242a", strap: resin, bezel: false, numerals: digital }
    styleDescription: >-
      The square G-Shock is a black resin protective shell built around a compact digital display, with exposed button labels, ridged strap, and almost no decorative polish. It looks like durable equipment from a late-1980s control room. The mood is tough, functional, youthful, and confidently inexpensive. Its quoted width sounds large, but the short integrated shape hugs the wrist better than many round watches of similar dimensions; thickness and blocky guards still make it feel substantial. This is the obvious companion for manual work, gym sessions, travel, hiking, surfing, festivals, and any situation where damage would be annoying. It fits workwear and streetwear particularly well. It can create an intentional high-low contrast with tailoring, but it is not a conventional wedding or office-formal watch. Choose it when the query says chunky, rugged, indestructible, accurate, or under $150. Skip it when the user wants artisanal mechanics, a thin cuff-friendly profile, or traditional elegance. Its lack of preciousness is precisely what makes it so useful.

  - id: nomos-tangente-38-164
