    price: { retail: 775, preOwnedLow: 430, preOwnedHigh: 600 }
    specs:
      caseDiameterMm: 40
      thicknessMm: 10.9
      lugToLugMm: 44
      lugWidthMm: 12
      movementType: automatic
      caliber: Powermatic 80.111
      powerReserveH: 80
      waterResistanceM: 100
      crystal: sapphire
      yearReleased: 2021
    art: { case: tonneau, dial: "#1a1c20", accent: "#d5d9dc", strap: bracelet, bezel: false, numerals: baton }
    styleDescription: >-
      A sharp 1970s-inspired sports watch with an angular tonneau case, black waffle-textured dial, simple baton hands, broad polished bezel, and a fully integrated steel bracelet. The geometry and bracelet do most of the talking; it feels fashionable and architectural rather than like traditional round watchmaking. Its mood is confident, youthful, and slightly flashy when the polished links catch light, but the black dial keeps this version relatively restrained. The case is thin and the first bracelet links turn down quickly, though the broad integrated form can still occupy a small wrist. It thrives with open-collar shirts, knit polos, contemporary suits, sneakers, and evening social settings. It can be a strong affordable wedding watch for someone who wants retro personality rather than formal delicacy. Practical water resistance and a long reserve suit everyday use. Choose it for value, integrated-bracelet style, or a sleek automatic under $1,000. Skip it for strap-swapping, tiny classic proportions, or a rugged field-watch brief; the proprietary narrow connection limits ordinary replacement straps.

  - id: sinn-556-i
