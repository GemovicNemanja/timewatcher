    reference: H69439931
    price: { retail: 625, preOwnedLow: 390, preOwnedHigh: 520 }
    specs:
      caseDiameterMm: 38
      thicknessMm: 9.5
      lugToLugMm: 47
      lugWidthMm: 20
      movementType: hand-wound
      caliber: Hamilton H-50
      powerReserveH: 80
      waterResistanceM: 50
      crystal: sapphire
      yearReleased: 2017
    art: { case: round, dial: "#181b18", accent: "#e8dfbd", strap: canvas, bezel: false, numerals: arabic }
    styleDescription: >-
      A deliberately simple military field watch with a matte black dial, highly legible cream-coloured Arabic numerals, slim syringe hands, a blasted steel case, and a practical green textile strap. It looks like useful equipment rather than jewellery. The hand-wound movement adds a small daily ritual and keeps the case notably thin, while the long lugs lend a little more wrist presence than the 38mm diameter suggests. The mood is honest, outdoorsy, vintage, and unpretentious. It pairs naturally with denim, boots, chore coats, flannel, fatigues, and casual weekend clothing. On a brown leather strap it can stretch to a relaxed office or rustic wedding, but the military dial is still too utilitarian for formal tailoring. It is especially strong for someone asking for a 1940s field-watch feeling, a compact mechanical watch, or excellent value under four figures. It is less suitable for swimming, polished business dress, or anyone who dislikes winding a watch by hand. Nothing about it is flashy, and that restraint is the point.

  - id: cartier-tank-must-large-wsta0041
