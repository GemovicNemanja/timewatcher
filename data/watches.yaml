    specs:
      caseDiameterMm: 38.5
      thicknessMm: 11
      lugToLugMm: 45.5
      lugWidthMm: 20
      movementType: automatic
      caliber: Sellita SW200-1
      powerReserveH: 38
      waterResistanceM: 200
      crystal: sapphire
      yearReleased: 2007
    art: { case: round, dial: "#111315", accent: "#f3f5f6", strap: bracelet, bezel: false, numerals: baton }
    styleDescription: >-
      A stripped-back German pilot-style watch with an inky black dial, four large white markers, compact date window, short white hands, a brushed steel case, and a fine-link bracelet. There is almost no ornament: no rotating bezel, no colourful flourish, and very little reflective polish. The mood is purposeful, modern, and discreet, like a cockpit instrument edited for civilian daily wear. Its 38.5mm case, short lugs, and moderate thickness make it an easy fit on small through medium wrists, while 200m resistance gives it hidden toughness. It pairs naturally with workwear, technical outerwear, denim, monochrome office clothing, and a simple blazer. On leather it becomes quiet enough for a casual wedding, although it remains an instrument watch rather than formal jewellery. Choose it when the request combines nothing flashy, rugged water capability, compact sizing, and clean design. It is less suitable for someone seeking visible heritage warmth, a decorative dial, a very long weekend-proof reserve, or a famous luxury badge.
