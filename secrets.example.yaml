# Copy this file to secrets.yaml. The real file is gitignored.
# No key is required for the keyless local demo; leave an api_key blank to omit it.
anthropic:
  # Optional for app startup; enables Opus reranking and description generation.
  api_key: ""
  model: "claude-opus-4-8"

openai:
  # Optional for a local-hash catalog; enables OpenAI semantic embeddings.
  api_key: ""
  embedding_model: "text-embedding-3-small"

search:
  # Non-secret. Controls the in-memory reranked-result cache.
  cache_ttl_seconds: 3600
